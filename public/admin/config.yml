# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: jonhbretas/ectolab
  branch: main
  base_url: https://sveltia-cms-auth-ectolab.jonathanbretas.workers.dev
  auth_methods:
    - oauth

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site_images
    label: Imagens do site
    media_folder: public/uploads/site-images
    public_folder: /uploads/site-images
    files:
      - name: images
        label: Todas as imagens
        file: content/site/images.json
        fields:
          - name: pages
            label: Paginas e pastas
            widget: list
            label_singular: Pagina/Pasta
            summary: "{{page}}"
            collapsed: auto
            hint: "Cada grupo representa uma pagina, pasta ou area global do site. Troque a imagem no campo 'Imagem substituta'. Recomendacao: envie arquivos WEBP otimizados para melhorar o desempenho."
            fields:
              - { name: page, label: Pagina ou area, widget: hidden }
              - { name: folder, label: Pasta interna sugerida, widget: hidden }
              - name: images
                label: Imagens desta pagina/pasta
                widget: list
                label_singular: Imagem
                summary: "{{label}}"
                collapsed: true
                fields:
                  - { name: label, label: Nome da imagem, widget: hidden }
                  - { name: originalPath, label: Caminho atual no site, widget: hidden }
                  - { name: image, label: Imagem substituta, widget: image, hint: "Preferir WEBP. Para manter a imagem atual, deixe igual ao caminho atual." }
                  - { name: alt, label: Texto alternativo, widget: string, required: false }
                  - { name: notes, label: Observacoes, widget: text, required: false, default: "Preferir WEBP otimizado para melhor desempenho." }

  - name: blog
    label: Blog
    label_singular: Post
    folder: content/blog
    media_folder: public/uploads/blog
    public_folder: /uploads/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Titulo, widget: string }
      - { name: slug, label: Slug, widget: string }
      - { name: description, label: Descricao, widget: text, required: false }
      - { name: date, label: Data, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { name: author, label: Autor, widget: string, default: ECTOLAB }
      - { name: category, label: Categoria, widget: string }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: coverImage, label: Imagem de capa, widget: image, required: false }
      - name: bodyImages
        label: Imagens internas do post
        widget: list
        required: false
        label_singular: Imagem
        summary: "{{label}}"
        collapsed: true
        hint: "Use para trocar imagens que aparecem dentro do corpo do artigo. Recomendacao: envie WEBP otimizado."
        fields:
          - { name: label, label: Nome da imagem, widget: hidden }
          - { name: originalPath, label: Caminho atual no artigo, widget: hidden }
          - { name: image, label: Imagem substituta, widget: image, hint: "Preferir WEBP. Para manter a imagem atual, deixe igual ao caminho atual." }
          - { name: alt, label: Texto alternativo, widget: string, required: false }
          - { name: notes, label: Observacoes, widget: text, required: false, default: "Preferir WEBP otimizado para melhor desempenho." }
      - { name: published, label: Publicado, widget: boolean, default: true }
      - { name: featured, label: Destaque, widget: boolean, default: false }
      - name: body
        label: Conteudo HTML
        widget: markdown
        hint: "Pode colar HTML completo otimizado aqui. O gerador preserva o HTML dentro do corpo do post."

  - name: agenda
    label: Agenda
    files:
      - name: event_types
        label: Tipos de eventos
        file: content/agenda/event-types.json
        fields:
          - name: types
            label: Tipos
            widget: list
            label_singular: Tipo
            summary: "{{label}}"
            collapsed: false
            hint: "Cadastre aqui os tipos usados na agenda. O campo Valor deve ser simples, sem acentos, em minusculo e com hifen. Ex.: programa, curso-online, semana-verbetes."
            fields:
              - { name: value, label: Valor interno, widget: string, hint: "Ex.: programa, oficina, curso-online. Use letras minusculas e hifen." }
              - { name: label, label: Nome singular, widget: string, hint: "Ex.: Programa." }
              - { name: plural, label: Nome no filtro, widget: string, required: false, hint: "Ex.: Programas. Se ficar vazio, usa o nome singular." }
      - name: event_models
        label: Modelos de eventos
        file: content/agenda/event-models.json
        fields:
          - name: models
            label: Modelos
            widget: list
            label_singular: Modelo
            summary: "{{label}}"
            collapsed: true
            fields:
              - { name: id, label: ID interno, widget: string, hint: "Use letras minusculas, numeros e hifen. Ex.: proep, dip, simposio." }
              - { name: label, label: Nome no CMS, widget: string }
              - { name: acronym, label: Sigla, widget: string, required: false, hint: "Ex.: DIP, PROEP, EPPI. O site usa a sigla junto com o nome completo." }
              - { name: fullName, label: Nome completo, widget: string, required: false, hint: "Ex.: Dinâmica Interassistencial da Paracirurgia." }
              - { name: title, label: Titulo padrao, widget: string, required: false, hint: "Opcional. Se sigla e nome completo estiverem preenchidos, o site monta o titulo automaticamente." }
              - name: category
                label: Tipo de evento padrao
                widget: select
                options:
                  - { label: Palestra, value: palestra }
                  - { label: Oficina, value: oficina }
                  - { label: Programa, value: programa }
                  - { label: Curso de Campo, value: curso-campo }
                  - { label: Curso Híbrido (libera Modalidades), value: curso-hibrido }
                  - { label: Curso Presencial, value: curso-presencial }
                  - { label: Curso Online, value: curso-online }
                  - { label: Verbete, value: verbete }
                  - { label: Artigo, value: artigo }
                  - { label: Simpósio, value: simposio }
                  - { label: Fórum, value: forum }
                  - { label: Dinâmica, value: dinamica }
                  - { label: Encontro, value: encontro }
              - { name: categoryCustom, label: Tipo personalizado padrao, widget: string, required: false, hint: "Use apenas quando o tipo ainda nao existir na lista. Ex.: Semana de Verbetes. O site cria o filtro automaticamente." }
              - { name: tag, label: Etiqueta padrao, widget: string, required: false }
              - name: status
                label: Status padrao
                widget: select
                required: false
                default: Em breve
                options:
                  - { label: Em breve, value: Em breve }
                  - { label: Inscrições Abertas, value: Inscrições Abertas }
                  - { label: Vagas preenchidas, value: Vagas preenchidas }
                  - { label: Realizado, value: Realizado }
              - { name: vacancies, label: Vagas do evento padrao, widget: string, required: false, hint: "Ex.: 20 vagas, Ate 30 vagas, Turma reduzida." }
              - { name: description, label: Descricao padrao, widget: text, required: false }
              - { name: location, label: Local padrao, widget: string, required: false }
              - { name: time, label: Horario/duracao padrao, widget: string, required: false }
              - { name: price, label: Preco padrao, widget: string, required: false }
              - { name: free, label: Gratuito por padrao, widget: boolean, default: false, required: false }
              - { name: href, label: Link da pagina no site, widget: string, required: false, default: /pages/atividades.html, hint: "Pagina interna usada automaticamente pelos eventos deste modelo. Ex.: /pages/curso-proep.html, /pages/dinamica.html ou /pages/blog.html." }
              - { name: buttonLabel, label: Texto do botao/link padrao, widget: string, required: false, default: Ver detalhes }
              - name: modalidades
                label: Modalidades hibridas (presencial + online)
                widget: list
                required: false
                label_singular: Modalidade
                summary: "{{label}} · {{price}}"
                collapsed: true
                condition: { field: category, value: curso-hibrido }
                hint: "So aparece quando o Tipo de evento e Curso Hibrido. Cadastre uma modalidade para cada opcao de inscricao (ex.: Presencial e Online), cada uma com seu proprio preco e link. Deixe vazio para usar um unico link/preco."
                fields:
                  - { name: label, label: Nome da modalidade, widget: string, hint: "Ex.: Presencial, Online." }
                  - { name: price, label: Preco desta modalidade, widget: string, required: false, hint: "Ex.: R$ 180,00." }
                  - { name: href, label: Link de inscricao, widget: string, required: false, hint: "URL da pagina de inscricao desta modalidade." }
                  - { name: buttonLabel, label: Texto do botao, widget: string, required: false, default: Inscrever-se, hint: "Ex.: Inscrever presencial, Inscrever online." }
              - { name: durationDays, label: Dias para frente padrao, widget: number, value_type: int, min: 0, required: false, hint: "Quantos dias o evento dura a partir da data de inicio. Use 0 para evento de um dia. Ex.: inicio 01/01 + 2 dias termina em 03/01." }
      - name: events
        label: Eventos
        file: content/agenda/events.json
        fields:
          - name: events
            label: Eventos
            widget: list
            label_singular: Evento
            summary: "{{date}} · {{title}}"
            collapsed: true
            minimize_collapsed: false
            max: 200
            hint: "Como cadastrar um evento: 1) Escolha um Modelo (preenche tudo automaticamente). 2) Informe a Data de inicio. 3) Se quiser, ajuste os campos abaixo. O site calcula dia da semana, mes, ano e data final sozinho. Se o evento tem preco diferente para presencial e online, escolha Tipo de evento = Curso Hibrido para liberar o campo Modalidades."
            fields:
              - name: model
                label: "1. Modelo do evento (preenche tudo automaticamente)"
                widget: select
                required: false
                hint: "Escolha um modelo para preencher automaticamente titulo, tipo, descricao, link, duracao e demais padroes. Os campos abaixo so precisam ser preenchidos quando algo mudar do padrao."
                options:
                  - { label: DIP - Dinâmica Interassistencial da Paracirurgia, value: dip }
                  - { label: Campo Paracirúrgico, value: campo-paracirurgico }
                  - { label: Curso DIP, value: curso-dip }
                  - { label: PROEP, value: proep }
                  - { label: Imersão em Ectoplasmia / IECTO, value: iecto-imersao }
                  - { label: EPPI, value: eppi }
                  - { label: Ectoplasmia Interassistencial, value: ectoplasmia-interassistencial }
                  - { label: Ectoplasmia Protetiva, value: ectoplasmia-protetiva }
                  - { label: Palestra / Tertúlia, value: palestra-tertulia }
                  - { label: Simpósio Ectolab, value: simposio }
                  - { label: Oficina, value: oficina }
                  - { label: Verbete, value: verbete }
                  - { label: Artigo, value: artigo }
                  - { label: Fórum, value: forum }
                  - { label: Encontro, value: encontro }
              - { name: title, label: "2. Complemento do titulo (opcional)", widget: string, required: false, hint: "Com modelo selecionado, o site ja usa SIGLA - nome completo. Preencha aqui apenas um complemento, como Turma 2027, Edicao 412 ou tema especifico." }
              - name: category
                label: "3. Tipo de evento"
                widget: select
                required: false
                hint: "Opcional quando um modelo foi escolhido. Preencha apenas se quiser substituir o tipo padrao do modelo. IMPORTANTE: escolha Curso Hibrido se o evento tiver precos e links diferentes para presencial e online — isso libera o campo Modalidades mais abaixo."
                options:
                  - { label: Palestra, value: palestra }
                  - { label: Oficina, value: oficina }
                  - { label: Programa, value: programa }
                  - { label: Curso de Campo, value: curso-campo }
                  - { label: Curso Híbrido (libera Modalidades), value: curso-hibrido }
                  - { label: Curso Presencial, value: curso-presencial }
                  - { label: Curso Online, value: curso-online }
                  - { label: Verbete, value: verbete }
                  - { label: Artigo, value: artigo }
                  - { label: Simpósio, value: simposio }
                  - { label: Fórum, value: forum }
                  - { label: Dinâmica, value: dinamica }
                  - { label: Encontro, value: encontro }
              - { name: categoryCustom, label: Tipo personalizado, widget: string, required: false, hint: "Use quando o tipo desejado ainda nao existir na lista acima. Ex.: Semana de Verbetes. Este texto aparece no evento e vira filtro automaticamente." }
              - { name: date, label: "4. Data de inicio", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, hint: "Data em que o evento comeca. O site calcula o dia da semana automaticamente." }
              - { name: durationDays, label: "5. Duracao em dias", widget: number, value_type: int, min: 0, required: false, hint: "Quantos dias o evento dura a partir da data de inicio. Use 0 para evento de um dia. Ex.: inicio 01/01 + 2 dias termina em 03/01." }
              - { name: href, label: Link do evento, widget: string, required: false, hint: "Para onde o botao do evento leva. Opcional: deixe vazio para usar o link padrao do modelo. Ex.: /pages/curso-proep.html ou https://orthocognitivus.org/loja/..." }
              - { name: description, label: Descricao curta, widget: text, required: false, hint: "Texto que aparece sob o titulo do evento na agenda. Ex.: Atividade pratica orientada para desenvolvimento tecnico." }
              - { name: location, label: Local, widget: string, required: false, hint: "Onde o evento acontece. Ex.: Foz do Iguaçu - PR · CEAEC." }
              - { name: time, label: Horario, widget: string, required: false, hint: "Horario ou formato. Ex.: 19h30 as 21h30, Sexta, sabado e domingo." }
              - { name: tag, label: Etiqueta exibida, widget: string, required: false, hint: "Opcional. Se ficar vazio, o site usa o tipo de evento." }
              - name: status
                label: Status
                widget: select
                required: false
                default: Em breve
                hint: "Se a data final do evento ja passou, o site mostra Realizado automaticamente, nao importa o que voce escolher aqui."
                options:
                  - { label: Em breve, value: Em breve }
                  - { label: Inscrições Abertas, value: Inscrições Abertas }
                  - { label: Vagas preenchidas, value: Vagas preenchidas }
                  - { label: Realizado, value: Realizado }
              - { name: vacancies, label: Vagas, widget: string, required: false, hint: "Texto curto sobre disponibilidade. Ex.: 20 vagas, Ate 30 vagas, Turma reduzida. Se usar modelo, deixe vazio para herdar o padrao." }
              - { name: price, label: Preco, widget: string, required: false, default: "", hint: "Preco exibido no card. Ex.: R$ 1.000, Gratuito. Se usar Modalidades (Curso Hibrido), este campo e ignorado — o site usa os precos de cada modalidade." }
              - { name: free, label: Evento gratuito, widget: boolean, default: false, required: false, hint: "Marque sim se o evento for gratuito. O site mostra a etiqueta GRATUITO no card." }
              - { name: buttonLabel, label: Texto do botao, widget: string, required: false, default: Ver detalhes, hint: "Texto que aparece no botao do evento. Ex.: Ver detalhes, Inscrever-se, Saiba mais." }
              - name: modalidades
                label: Modalidades hibridas (presencial + online)
                widget: list
                required: false
                label_singular: Modalidade
                summary: "{{label}} · {{price}}"
                collapsed: true
                condition: { field: category, value: curso-hibrido }
                hint: "Este campo so aparece quando o Tipo de evento (campo 3) e Curso Hibrido. Cadastre uma modalidade para cada opcao de inscricao (ex.: Presencial e Online), cada uma com seu proprio preco e link de inscricao. O site mostra um botao para cada modalidade."
                fields:
                  - { name: label, label: Nome da modalidade, widget: string, hint: "Ex.: Presencial, Online." }
                  - { name: price, label: Preco desta modalidade, widget: string, required: false, hint: "Ex.: R$ 180,00." }
                  - { name: href, label: Link de inscricao, widget: string, required: false, hint: "URL da pagina de inscricao desta modalidade." }
                  - { name: buttonLabel, label: Texto do botao, widget: string, required: false, default: Inscrever-se, hint: "Ex.: Inscrever presencial, Inscrever online." }
              - { name: featured, label: Destaque na agenda, widget: boolean, default: false, required: false, hint: "Marque sim para destacar este evento na secao Principais Eventos da pagina de agenda. Ele tambem entra automaticamente na Home." }
              - { name: featuredStyle, label: Estilo do destaque, widget: select, required: false, default: default, hint: "Aparencia do card de destaque. Default = claro, Dark = fundo escuro, Gold = destaque dourado, Highlight = super chamativo com borda animada que muda de cor (use para o evento mais importante).", options: ["default", "dark", "gold", "highlight"] }
              - { name: featuredDate, label: Data no destaque, widget: string, required: false, hint: "Opcional. Texto personalizado para a data no card de destaque. Se ficar vazio, o site formata a data automaticamente." }
              - { name: featuredCategory, label: Categoria no destaque, widget: string, required: false, hint: "Opcional. Texto personalizado para a categoria no card de destaque. Se ficar vazio, o site usa o tipo do evento." }
              - { name: pinHome, label: Fixar na home, widget: boolean, default: false, required: false, hint: "Marque sim para fixar este evento na secao Proximas Atividades da Home. Use junto com Ordem na home para controlar a posicao." }
              - { name: homeOrdem, label: Ordem na home (1 a 5), widget: number, value_type: int, min: 1, max: 5, required: false, hint: "Posicao do evento na Home. Menor numero aparece primeiro. Use junto com Fixar na home. Ex.: 1 = primeiro, 5 = quinto." }

  - name: popup
    label: Pop-up de divulgação
    files:
      - name: popup
        label: Pop-up (modal central)
        file: public/popup.json
        media_folder: public/uploads/popup
        public_folder: /uploads/popup
        fields:
          - { name: active, label: Ativar pop-up, widget: boolean, default: false, hint: "Ligue para exibir o pop-up modal centralizado no site. Desligue para ocultar." }
          - name: displayMode
            label: O que exibir
            widget: select
            default: texto
            hint: "Escolha se o pop-up mostra somente texto, somente imagem ou os dois."
            options:
              - { label: Somente texto, value: texto }
              - { label: Imagem + texto, value: imagem-texto }
              - { label: Somente imagem, value: imagem }
          - { name: image, label: Imagem, widget: image, required: false, hint: "Usada nos modos 'Imagem + texto' e 'Somente imagem'. Preferir WEBP otimizado. No modo 'Somente imagem', o clique leva ao Link do botao." }
          - { name: imageAlt, label: Texto alternativo da imagem, widget: string, required: false, hint: "Descreve a imagem para acessibilidade e buscadores." }
          - { name: eyebrow, label: Etiqueta (linha pequena acima do titulo), widget: string, required: false, hint: "Ex.: Marco historico, Vagas abertas, Novidade." }
          - { name: title, label: Titulo, widget: string, required: false }
          - { name: text, label: Texto, widget: text, required: false }
          - { name: buttonLabel, label: Texto do botao, widget: string, required: false, default: Saiba mais }
          - { name: buttonHref, label: Link do botao, widget: string, required: false, hint: "Para onde o botao (ou a imagem, no modo Somente imagem) leva. Ex.: link de inscricao." }
          - { name: cooldownDays, label: Dias sem repetir apos fechar, widget: number, value_type: int, default: 3, min: 0, required: false, hint: "Quantos dias aguardar antes de mostrar de novo para quem ja fechou. Se voce editar o conteudo, o pop-up volta a aparecer mesmo dentro desse prazo." }
          - { name: delaySeconds, label: Segundos ate aparecer, widget: number, value_type: int, default: 2, min: 0, required: false, hint: "Tempo de espera apos abrir a pagina antes do pop-up surgir." }
